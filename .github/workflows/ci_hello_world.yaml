name: CI Pre-commit checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci_hello_world:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Pre-commit
        run: uv run pre-commit run --all-files
