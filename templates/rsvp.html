<form method="POST">
    <label>Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Will you be attending?</label><br>
    <select name="attending">
        <option value="yes">Yes, with bells on!</option>
        <option value="no">Sadly, no.</option>
    </select><br><br>

    <label>Meal Choice:</label><br>
    <input type="radio" name="meal" value="Beef"> Beef
    <input type="radio" name="meal" value="Fish"> Fish
    <input type="radio" name="meal" value="Veg"> Veggie<br><br>

    <label>Song Request:</label><br>
    <input type="text" name="song"><br><br>

    <button type="submit">Submit RSVP</button>
</form>
