{% extends "layout.html" %}

{% block content %}
<h2>RSVP</h2>
<p>Please fill in the form separately for everyone in your party.</p>

<form method="POST">
    <label for="name">Your Full Name</label>
    <input type="text" id="name" name="name" placeholder="Auntie May" required>
    <br>

    <label for="attending">Will you be attending?</label>
    <select id="attending" name="attending">
        <option value="yes">Yes, definitely!</option>
        <option value="no">Sadly, no.</option>
    </select>
    <br>

    <label>Main Course Preference</label><br>
    {% for option in wedding.meal_options %}
    <label><input type="radio" name="meal" value="{{ option.value }}"> {{ option.label }}</label><br>
    {% endfor %}

    <label for="dietary_requirements">Dietary requirements</label>
    <input type="text" id="dietary_requirements" name="dietary_requirements">

    <br>
    <button type="submit" class="button">Submit Response</button>
</form>
{% endblock %}
