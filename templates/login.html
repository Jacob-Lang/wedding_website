<!DOCTYPE html>
<html>
<head>
    <title>Login - Wedding</title>
</head>
<body>
    <h2>Welcome! Please enter the password from your invitation:</h2>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        <input type="password" name="password" placeholder="Enter Password">
        <button type="submit">Enter Site</button>
    </form>
</body>
</html>
