{% extends "layout.html" %}

{% block content %}

{% if not admin_mode %}
<h2>Welcome! Please enter the password from your invitation:</h2>
{% elif admin_mode %}
<h2>Please enter the admin password:</h2>
{% endif %}

{% if error %}
    <p style="color: red;">{{ error }}</p>
{% endif %}

<form method="post">
    <input type="password" name="password" placeholder="Enter Password">
    <button type="submit">Enter Site</button>
</form>
{% endblock %}
